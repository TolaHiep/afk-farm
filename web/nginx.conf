server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Nén để tải nhanh hơn
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache tài nguyên tĩnh (js/css/ảnh có hash trong tên file)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: mọi đường dẫn không khớp file đều trả về index.html
    # để React Router xử lý (tránh lỗi 404 khi refresh trang con)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
