server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;   # cho phép upload ảnh báo cáo

    # Nén để tải nhanh hơn
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Tài nguyên tĩnh CỦA REACT (js/css có hash) — KHÔNG proxy sang backend
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API + file của Frappe (cùng gốc) -> backend. Host=akf.localhost để Frappe phân giải site.
    # "akf-backend" map tới host-gateway trong docker-compose (trỏ về bench serve cổng 8000).
    location /api/ {
        proxy_pass http://akf-backend:8000;
        proxy_set_header Host akf.localhost;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /files/ {
        proxy_pass http://akf-backend:8000;
        proxy_set_header Host akf.localhost;
    }
    location /private/ {
        proxy_pass http://akf-backend:8000;
        proxy_set_header Host akf.localhost;
    }

    # SPA fallback: mọi đường dẫn không khớp file đều trả về index.html
    # để React Router xử lý (tránh lỗi 404 khi refresh trang con)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
