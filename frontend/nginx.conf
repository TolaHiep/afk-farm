server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;   # cho phép upload ảnh báo cáo

    # Nén để tải nhanh hơn
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Tài nguyên tĩnh CỦA REACT (js/css có hash) — KHÔNG proxy sang backend
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API + file Frappe (cung goc) -> service backend trong compose.
    # Host=akf.localhost de Frappe phan giai site (doc lap voi domain VPS).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host akf.localhost;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /files/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host akf.localhost;
    }
    location /private/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host akf.localhost;
    }
    # Realtime (Frappe socketio)
    location /socket.io/ {
        proxy_pass http://websocket:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host akf.localhost;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback: mọi đường dẫn không khớp file đều trả về index.html
    # để React Router xử lý (tránh lỗi 404 khi refresh trang con)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
